<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RaceIQ — GPS Story Cards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F4F1EC;
  --bg2: #EDE9E1;
  --surface: #FFFFFF;
  --surface2: #F9F7F4;
  --border: #E2DDD5;
  --border2: #D4CFC6;
  --gold: #9A6F2F;
  --gold-light: #C9A84C;
  --gold-bg: #FDF6E8;
  --teal: #1A7A6E;
  --teal-light: #2AA898;
  --teal-bg: #EBF7F5;
  --red: #C0392B;
  --red-bg: #FDF0EE;
  --ink: #1C1A17;
  --ink2: #3D3A34;
  --muted: #7A7268;
  --muted2: #A09890;
  --ghost: #6B4FA8;
  --ghost-bg: #F2EEFF;
  --rocket: #C05C1A;
  --rocket-bg: #FFF0E6;
  --grinder: #1A7A6E;
  --grinder-bg: #EBF7F5;
  --gambler: #B03060;
  --gambler-bg: #FDEEF3;
  --shadow-sm: 0 1px 3px rgba(28,26,23,0.06), 0 1px 2px rgba(28,26,23,0.04);
  --shadow-md: 0 4px 12px rgba(28,26,23,0.08), 0 2px 4px rgba(28,26,23,0.04);
  --shadow-lg: 0 8px 24px rgba(28,26,23,0.1), 0 4px 8px rgba(28,26,23,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}
.app { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px; }

/* ── TICKER / NEWS BOARD ─────────────────────────────────────── */
.news-board {
  background: var(--ink);
  margin: 0 -20px;
  padding: 0;
  overflow: hidden;
  position: relative;
}
.news-inner {
  display: flex;
  align-items: stretch;
}
.news-label {
  background: var(--gold-light);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  white-space: nowrap;
  z-index: 2;
}
.ticker-wrap {
  flex: 1;
  overflow: hidden;
  padding: 10px 0;
}
.ticker-track {
  display: flex;
  gap: 0;
  animation: ticker 55s linear infinite;
  width: max-content;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 28px;
  border-right: 1px solid rgba(255,255,255,0.1);
  white-space: nowrap;
  cursor: default;
}
.ticker-item:hover .ticker-horse { color: var(--gold-light); }
.ticker-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.ticker-race { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 500; }
.ticker-horse { font-size: 12px; color: #fff; font-weight: 600; transition: color .2s; }
.ticker-odds { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold-light); }
.ticker-sep { font-size: 10px; color: rgba(255,255,255,0.2); margin: 0 4px; }

/* ── UPCOMING RACES PANEL ────────────────────────────────────── */
.upcoming-section { padding: 20px 0 4px; }
.upcoming-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.upcoming-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
}
.upcoming-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.live-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--red);
  font-weight: 600;
}
.live-pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.race-cards-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.race-news-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
  cursor: default;
}
.race-news-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: var(--border2);
}
.rnc-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.rnc-track {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
}
.rnc-num {
  font-size: 10px;
  color: var(--muted);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 8px;
}
.rnc-race-name {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.rnc-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.rnc-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 500;
}
.rnc-tag-dist { background: var(--gold-bg); color: var(--gold); }
.rnc-tag-surf { background: var(--bg2); color: var(--muted); }
.rnc-tag-purse { background: var(--teal-bg); color: var(--teal); }
.rnc-horses { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
.rnc-horse-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 3px 0;
}
.rnc-horse-name { font-size: 11px; color: var(--ink2); font-weight: 500; }
.rnc-horse-odds {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}
.rnc-horse-odds.fav {
  color: var(--gold);
  font-weight: 600;
}
.rnc-more { font-size: 10px; color: var(--muted2); margin-top: 4px; }

/* ── MAIN HEADER ─────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  border-radius: 11px;
  display: grid; place-items: center;
  font-size: 20px;
  box-shadow: var(--shadow-sm);
}
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
}
.logo-name span { color: var(--gold); }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
.gps-badge {
  background: var(--teal-bg);
  border: 1px solid rgba(26,122,110,0.2);
  color: var(--teal);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* ── TABS ────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 3px;
  margin-bottom: 20px;
  background: var(--surface);
  padding: 4px;
  border-radius: 12px;
  width: fit-content;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.tab {
  padding: 8px 18px;
  border-radius: 9px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: transparent;
  transition: all .2s;
}
.tab.active { background: var(--gold); color: #fff; box-shadow: var(--shadow-sm); }
.tab:hover:not(.active) { color: var(--ink); background: var(--bg2); }

/* ── RACE PILLS ──────────────────────────────────────────────── */
.race-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }
.rpill {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface);
  color: var(--muted);
  transition: all .2s;
  box-shadow: var(--shadow-sm);
}
.rpill.active { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
.rpill:hover:not(.active) { border-color: var(--border2); color: var(--ink); }

/* ── HORSE GRID ──────────────────────────────────────────────── */
.hgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}
.hbtn {
  padding: 11px 13px;
  border-radius: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  transition: all .2s;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.hbtn:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.hbtn.active { border-color: var(--gold); background: var(--gold-bg); box-shadow: var(--shadow-md); }
.hbtn-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 5px; }
.hbtn-foot { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
.pos-dot {
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-grid; place-items: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.arch-pip { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 2px 2px 0 0; }

/* ── STORY CARD ──────────────────────────────────────────────── */
.scard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.scard-header {
  padding: 22px 26px 18px;
  background: linear-gradient(135deg, #FDFCFA, #F9F6F0);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.horse-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 9px;
}
.meta-row { display: flex; gap: 6px; flex-wrap: wrap; }
.mtag { padding: 3px 9px; border-radius: 12px; font-size: 10px; font-weight: 600; letter-spacing: .3px; }
.mtag-race { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(154,111,47,.15); }
.mtag-surf { background: var(--bg2); color: var(--muted); }
.mtag-purse { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(26,122,110,.15); }
.card-finish { text-align: right; flex-shrink: 0; }
.finish-num {
  font-family: 'Playfair Display', serif;
  font-size: 54px; font-weight: 900; line-height: 1;
}
.finish-lbl { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

.arch-strip {
  padding: 8px 26px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

/* ── CARD BODY TWO-COL ───────────────────────────────────────── */
.card-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
@media (max-width: 640px) { .card-body { grid-template-columns: 1fr; } }
.col-left { padding: 20px 26px; border-right: 1px solid var(--border); }
.col-right { padding: 20px 26px; }
.sec-title {
  font-size: 9px;
  color: var(--muted2);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 14px;
}

/* PERCENTILE BARS */
.pbar-list { display: flex; flex-direction: column; gap: 8px; }
.pbar-row { display: flex; align-items: center; gap: 8px; }
.pbar-label {
  font-size: 10px;
  color: var(--muted);
  width: 112px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pbar-track {
  flex: 1;
  height: 5px;
  background: var(--bg2);
  border-radius: 3px;
  overflow: hidden;
}
.pbar-fill { height: 100%; border-radius: 3px; transition: width .7s ease; }
.pbar-num {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  width: 26px;
  text-align: right;
  flex-shrink: 0;
}

/* METRIC CARDS GRID */
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.mcard {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.mcard-top { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.mcard-name { font-size: 9px; color: var(--muted); margin-bottom: 3px; }
.mcard-val {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}
.mcard-tag { font-size: 9px; font-weight: 700; }

/* CHART */
.chart-wrap { padding: 0 26px 20px; border-top: 1px solid var(--border); }
.chart-inner {
  background: var(--surface2);
  border-radius: 12px;
  padding: 14px 16px 10px;
  border: 1px solid var(--border);
  margin-top: 16px;
}
.chart-labs {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}
.chart-lab { font-size: 9px; color: var(--muted2); }

/* NARRATIVE */
.narr-wrap { padding: 0 26px 22px; }
.narr-box {
  background: var(--teal-bg);
  border: 1px solid rgba(26,122,110,.2);
  border-radius: 14px;
  padding: 16px 18px;
}
.narr-lbl {
  font-size: 9px;
  color: var(--teal);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 7px;
}
.narr-text {
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink2);
  font-style: italic;
}
.share-row { display: flex; gap: 7px; margin-top: 13px; flex-wrap: wrap; }
.sbtn {
  padding: 8px 16px;
  border-radius: 9px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  border: none;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sbtn-primary { background: var(--gold); color: #fff; }
.sbtn-primary:hover { background: var(--gold-light); }
.sbtn-sec { background: var(--surface); color: var(--ink2); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.sbtn-sec:hover { border-color: var(--border2); }

/* ── LEADERBOARD ─────────────────────────────────────────────── */
.lb { display: flex; flex-direction: column; gap: 26px; }
.lb-head {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 9px;
}
.lb-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center; font-size: 14px; flex-shrink: 0;
}
.lb-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.lcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 15px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
}
.lcard:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.lrank {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 900;
  color: var(--border2); flex-shrink: 0; width: 26px; text-align: center;
}
.lrank.r1 { color: var(--gold); }
.lrank.r2 { color: #8A9BAD; }
.lrank.r3 { color: #C97B3C; }
.linfo { flex: 1; min-width: 0; }
.lhorse { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lsub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.lstat { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; flex-shrink: 0; }

/* ── TRENDS ──────────────────────────────────────────────────── */
.tgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.tcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.thead2 { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
.ticon { font-size: 20px; }
.ttitle { font-size: 14px; font-weight: 700; color: var(--ink); }
.tsub { font-size: 10px; color: var(--muted); }
.tbody { font-size: 12px; color: var(--muted); line-height: 1.7; }
.thi { color: var(--ink); font-weight: 600; }
.thook {
  margin-top: 11px;
  padding: 8px 12px;
  background: var(--teal-bg);
  border-radius: 9px;
  border-left: 3px solid var(--teal);
  font-size: 11px;
  font-style: italic;
  color: var(--teal);
}

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty .big { font-size: 48px; margin-bottom: 12px; }

@media (max-width: 640px) {
  .horse-title { font-size: 22px; }
  .finish-num { font-size: 40px; }
  .race-cards-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<script type="text/babel">
const { useState, useMemo } = React;

const ARCH = {
  Ghost:   { color: '#6B4FA8', bg: '#F2EEFF', emoji: '👻', desc: 'Comes from nowhere' },
  Rocket:  { color: '#C05C1A', bg: '#FFF0E6', emoji: '🚀', desc: 'Blazing front-runner' },
  Grinder: { color: '#1A7A6E', bg: '#EBF7F5', emoji: '⚙️', desc: 'Steady & relentless' },
  Gambler: { color: '#B03060', bg: '#FDEEF3', emoji: '🎲', desc: 'Boom or bust' },
};

const GPS13 = [
  { key: 'late_speed',         pct: 'late_speed_pct',         label: 'Late Speed',       unit: 'ft/s' },
  { key: 'early_speed',        pct: 'early_speed_pct',        label: 'Early Speed',      unit: 'ft/s' },
  { key: 'speed_change_pct',   pct: 'speed_change_pct_pct',   label: 'Speed Change',     unit: '%'    },
  { key: 'late_stride_len',    pct: 'late_stride_len_pct',    label: 'Late Stride Len',  unit: 'ft'   },
  { key: 'early_stride_len',   pct: 'early_stride_len_pct',   label: 'Early Stride Len', unit: 'ft'   },
  { key: 'stride_delay',       pct: 'stride_delay_pct',       label: 'Stride Delay',     unit: 'st'   },
  { key: 'pace_consistency',   pct: 'pace_consistency_pct',   label: 'Pace Consistency', unit: 'σ'    },
  { key: 'ground_loss',        pct: 'ground_loss_pct',        label: 'Ground Loss',      unit: 'ft'   },
  { key: 'max_dist_behind',    pct: 'max_dist_behind_pct',    label: 'Max Gap Behind',   unit: 'ft'   },
  { key: 'max_time_behind',    pct: 'max_time_behind_pct',    label: 'Max Time Behind',  unit: 's'    },
  { key: 'total_running_time', pct: 'total_running_time_pct', label: 'Running Time',     unit: 's'    },
  { key: 'total_strides',      pct: 'total_strides_pct',      label: 'Total Strides',    unit: ''     },
  { key: 'total_distance_ran', pct: 'total_distance_ran_pct', label: 'Total Distance',   unit: 'ft'   },
];

function pBarColor(pct) {
  if (pct >= 80) return '#1A7A6E';
  if (pct >= 50) return '#C9A84C';
  return '#C0392B';
}

function tagFor(pct) {
  if (pct >= 90) return { t: `Top ${100 - pct + 1}%`, c: '#1A7A6E' };
  if (pct >= 75) return { t: 'Above Avg',   c: '#9A6F2F' };
  if (pct >= 45) return { t: 'Average',     c: '#7A7268' };
  return             { t: 'Below Avg',   c: '#C0392B' };
}

function posColor(p) {
  if (p === 1) return '#9A6F2F';
  if (p === 2) return '#6B7C8D';
  if (p === 3) return '#A0522D';
  return '#C8C0B4';
}

function fmtVal(h, m) {
  const v = h[m.key];
  if (v === null || v === undefined) return '—';
  if (m.key === 'ground_loss') return `${Math.abs(v).toFixed(0)}${m.unit}`;
  if (m.unit === '%') return `${v.toFixed(0)}${m.unit}`;
  if (m.unit === 'ft/s' || m.unit === 'ft') return `${v.toFixed(1)}${m.unit}`;
  if (m.unit === 's') return `${v.toFixed(2)}${m.unit}`;
  if (m.unit === 'σ') return `${m.unit}${v.toFixed(2)}`;
  return `${v.toFixed(1)}${m.unit}`;
}

function narrative(h) {
  const bits = [];
  const cb = h.mid_position - h.official_position;
  if (cb >= 5) bits.push(`Came from ${h.mid_position}th at the midpoint to finish ${h.official_position}${['','st','nd','rd'][h.official_position]||'th'} — one of the biggest moves in the field.`);
  else if (cb >= 3) bits.push(`Buried in the pack at halfway, then found another gear when it mattered most.`);
  else if (h.first_position <= 2 && h.official_position <= 3) bits.push(`Controlled the pace from the front and never gave it up.`);
  if (h.late_speed_pct >= 90) bits.push(`Posted a top-${100 - h.late_speed_pct + 1}% closing speed — elite finishing kick.`);
  if (h.early_stride_len_pct >= 85 && h.late_stride_len_pct >= 85) bits.push(`Exceptional stride efficiency from start to finish.`);
  else if (h.late_stride_len_pct >= 85) bits.push(`Stride length actually grew in the final furlong — a horse that wasn't done.`);
  if (h.ground_loss_pct >= 88) bits.push(`Ran one of the tightest paths in the field — no wasted distance.`);
  if (h.pace_consistency_pct >= 85) bits.push(`Rock-solid pace consistency — every split nearly identical.`);
  if (h.max_dist_behind > 60 && h.official_position <= 4) bits.push(`Was ${h.max_dist_behind.toFixed(0)} feet behind at worst — and still made the top 4.`);
  if (h.official_position > 5 && h.late_speed_pct >= 80) bits.push(`The finish position doesn't tell the whole story — GPS shows elite closing ability the scoreboard missed.`);
  if (h.total_strides_pct >= 80) bits.push(`Used fewer strides than average — raw mechanical efficiency.`);
  if (!bits.length) bits.push(`${ARCH[h.archetype]?.emoji} A classic ${h.archetype} — ${ARCH[h.archetype]?.desc.toLowerCase()}. The GPS profile reveals what the final position can't.`);
  return bits.join(' ');
}

function PosChart({ history, gates }) {
  const n = history.length;
  if (n < 2) return null;
  const maxP = Math.max(...history, 1);
  const W = 320, H = 68, pd = 10;
  const xs = gates.map((_, i) => pd + (i / (n - 1)) * (W - 2 * pd));
  const ys = history.map(p => pd + ((p - 1) / Math.max(maxP - 1, 1)) * (H - 2 * pd));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[n-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1A7A6E" stopOpacity="0.15"/>
          <stop offset="100%" stopColor="#1A7A6E" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#cg)"/>
      <path d={path} fill="none" stroke="#1A7A6E" strokeWidth="1.8" strokeLinejoin="round"/>
      {xs.map((x, i) => (
        <circle key={i} cx={x} cy={ys[i]} r={i === 0 || i === n-1 ? 3.5 : 2}
          fill={i === n-1 ? '#9A6F2F' : i === 0 ? '#1A7A6E' : '#E2DDD5'}
          stroke={i === n-1 ? '#9A6F2F' : '#1A7A6E'} strokeWidth="1.2"/>
      ))}
      <text x={xs[0]} y={ys[0]-7} fill="#A09890" fontSize="8" textAnchor="middle">P{history[0]}</text>
      <text x={xs[n-1]} y={ys[n-1]-7} fill="#9A6F2F" fontSize="8" textAnchor="middle">P{history[n-1]}</text>
    </svg>
  );
}

/* ── NEWS TICKER ────────────────────────────────────────────── */
function NewsTicker() {

    r.horses.map(h => ({ race: `AQU R${r.race}`, horse: h.name, odds: h.odds, dist: r.dist }))

/* ── UPCOMING RACES BOARD ────────────────────────────────────── */
function UpcomingBoard() {

    <div className="upcoming-section">
      <div className="upcoming-header">
        <div>
          <div className="upcoming-title">Upcoming Races — Aqueduct 3/27</div>

                  <div key={h.name} className="rnc-horse-row">

/* ── STORY CARD ─────────────────────────────────────────────── */
function StoryCard({ horse }) {

  const narr = narrative(horse);
  const pc = posColor(horse.official_position);
  return (
    <div className="scard">
      <div className="scard-header">
        <div>
          <div className="horse-title">{horse.horse_name}</div>
          <div className="meta-row">

            <span className="mtag mtag-surf">{horse.surface === 'D' ? '🟤 Dirt' : '🟢 Turf'} · {horse.distance}f · {horse.race_type}</span>
            <span className="mtag mtag-purse">${horse.purse.toLocaleString()}</span>
          </div>
        </div>
        <div className="card-finish">
          <div className="finish-num" style={{ color: pc }}>{horse.official_position}<sup style={{ fontSize: '18px', verticalAlign: 'super' }}>{horse.official_position===1?'st':horse.official_position===2?'nd':horse.official_position===3?'rd':'th'}</sup></div>
          <div className="finish-lbl">Finish</div>

      </div>

      <div className="arch-strip" style={{ background: arch.bg, color: arch.color, borderColor: arch.color + '25' }}>

        <span>{horse.archetype.toUpperCase()}</span>
        <span style={{ opacity: .4, fontSize: '9px' }}>·</span>
        <span style={{ fontWeight: 400, letterSpacing: '1px', fontSize: '9px', opacity: .7 }}>{arch.desc.toUpperCase()}</span>
        <span style={{ marginLeft: 'auto', fontFamily: "'DM Mono',monospace", fontSize: '11px', opacity: .6 }}>
          ML {horse.morning_line_odds} · Post {horse.post_position}
        </span>
      </div>

      <div className="card-body">
        <div className="col-left">
          <div className="sec-title">All 13 GPS Metrics — Percentile vs Field</div>
          <div className="pbar-list">
            {GPS13.map(m => {
              const pct = horse[m.pct] || 0;
              const col = pBarColor(pct);
              return (
                <div key={m.key} className="pbar-row">
                  <div className="pbar-label">{m.label}</div>
                  <div className="pbar-track">
                    <div className="pbar-fill" style={{ width: `${pct}%`, background: col }}/>
                  </div>
                  <div className="pbar-num" style={{ color: col }}>{pct}</div>

            })}

        </div>
        <div className="col-right">
          <div className="sec-title">GPS Values</div>
          <div className="mgrid">
            {GPS13.map(m => {
              const pct = horse[m.pct] || 0;
              const tag = tagFor(pct);
              return (
                <div key={m.key} className="mcard">
                  <div className="mcard-top" style={{ background: pBarColor(pct) }}/>

                  <div className="mcard-val">{fmtVal(horse, m)}</div>

      <div className="chart-wrap">
        <div className="sec-title" style={{ paddingTop: '16px' }}>Position Through Race — Gate by Gate</div>

          <div className="chart-labs">
            <span className="chart-lab">Start</span>

      <div className="narr-wrap">

/* ── LEADERBOARD ─────────────────────────────────────────────── */
function Leaderboard({ data }) {
  const secs = [
    { title: 'Fastest Closers',     icon: '⚡', color: '#1A7A6E', bg: '#EBF7F5', items: [...data].sort((a,b)=>(b.late_speed||0)-(a.late_speed||0)).slice(0,5),         stat: h=>`${h.late_speed?.toFixed(1)} ft/s`,   sub: h=>`Race ${h.race_number} · P${h.official_position}` },
    { title: 'Fastest Out of Gate', icon: '🚀', color: '#C05C1A', bg: '#FFF0E6', items: [...data].sort((a,b)=>(b.early_speed||0)-(a.early_speed||0)).slice(0,5),        stat: h=>`${h.early_speed?.toFixed(1)} ft/s`,  sub: h=>`Race ${h.race_number} · P${h.official_position}` },
    { title: 'Biggest Comebacks',   icon: '👻', color: '#6B4FA8', bg: '#F2EEFF', items: [...data].filter(h=>h.mid_position-h.official_position>=3).sort((a,b)=>(b.mid_position-b.official_position)-(a.mid_position-a.official_position)).slice(0,5), stat: h=>`+${h.mid_position-h.official_position} pos`, sub: h=>`P${h.mid_position} → P${h.official_position}` },
    { title: 'Best Stride Efficiency', icon: '🦾', color: '#1A7A6E', bg: '#EBF7F5', items: [...data].sort((a,b)=>(b.late_stride_len||0)-(a.late_stride_len||0)).slice(0,5), stat: h=>`${h.late_stride_len?.toFixed(2)} ft`, sub: h=>`Late stride length` },
    { title: 'Most Consistent Pace', icon: '⭐', color: '#9A6F2F', bg: '#FDF6E8', items: [...data].sort((a,b)=>b.pace_consistency_pct-a.pace_consistency_pct).slice(0,5), stat: h=>`σ ${h.pace_consistency.toFixed(2)}`, sub: h=>`${h.pace_consistency_pct}th percentile` },
    { title: 'Robbed by Scoreboard', icon: '😤', color: '#B03060', bg: '#FDEEF3', items: [...data].filter(h=>h.official_position>4&&h.late_speed_pct>=80).sort((a,b)=>b.late_speed_pct-a.late_speed_pct).slice(0,5), stat: h=>`P${h.official_position}`, sub: h=>`${h.late_speed_pct}th pct closing speed` },
  ];
  return (
    <div className="lb">
      {secs.map(s => (
        <div key={s.title}>
          <div className="lb-head">
            <div className="lb-icon" style={{ background: s.bg }}>{s.icon}</div>
            <span style={{ color: s.color }}>{s.title}</span>
          </div>
          <div className="lb-cards">
            {s.items.map((h, i) => (
              <div key={h.horse_name + h.race_date} className="lcard">
                <div className={`lrank ${i===0?'r1':i===1?'r2':i===2?'r3':''}`}>{i + 1}</div>
                <div className="linfo">
                  <div className="lhorse">{h.horse_name}</div>
                  <div className="lsub">{s.sub(h)}</div>
                </div>
                <div className="lstat" style={{ color: s.color }}>{s.stat(h)}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── TRENDS ──────────────────────────────────────────────────── */
function Trends({ data }) {
  const avgLS = (data.reduce((s,h)=>s+(h.late_speed||0),0)/data.length).toFixed(1);
  const avgES = (data.reduce((s,h)=>s+(h.early_speed||0),0)/data.length).toFixed(1);
  const strideGrowers = data.filter(h=>(h.late_stride_len||0)>(h.early_stride_len||0));
  const robbed = data.filter(h=>h.official_position>4&&h.late_speed_pct>=80);
  const bigCB = data.filter(h=>h.mid_position-h.official_position>=5);
  const efficient = data.filter(h=>h.total_strides_pct>=75);
  const trends = [
    { icon:'⚡', title:'Late Speed Beats Early Speed', sub:'The metric that decides races',
      body: <><span className="thi">{avgES} ft/s early</span> → <span className="thi">{avgLS} ft/s late</span>. That acceleration gap is where races are won and lost — completely invisible in traditional finishing times.</>,
      hook: `"The race doesn't start until the final furlong."` },
    { icon:'🦾', title:'Stride Length Tells the Real Story', sub:`${strideGrowers.length} of ${data.length} horses grew their stride late`,
      body: <><span className="thi">{strideGrowers.length} horses</span> had longer strides in the final furlong than at the start — actually accelerating at the finish. Horses that shorten their stride are fading. GPS sees this instantly.</>,
      hook: `"Stride getting longer? That horse wasn't done."` },
    { icon:'😤', title:`${robbed.length} Horses Were GPS-Robbed`, sub:'Strong metrics, bad finish position',
      body: <><span className="thi">{robbed.length} horses</span> finished outside the top 4 but had top-20% closing speed. Trapped, blocked, or drawn wide. GPS finds them. Traditional stats don't.</>,
      hook: `"Lost the race. Won the GPS. Back them next time."` },
    { icon:'👻', title:`${bigCB.length} Five-Plus Spot Comebacks`, sub:'Drama that never shows on the form card',
      body: <><span className="thi">{bigCB.length} horses</span> gained 5+ positions between midpoint and finish. That's explosive late-race action that generates engagement — and it's in every single race.</>,
      hook: `"Was last. Finished 3rd. Nobody noticed until GPS."` },
    { icon:'🎯', title:'Total Strides = Hidden Efficiency', sub:`${efficient.length} horses above 75th percentile`,
      body: <>Fewer strides for the same distance means better technique and less fatigue. <span className="thi">{efficient.length} horses</span> ran measurably more efficiently than average — a metric no traditional form guide captures.</>,
      hook: `"Fewer strides. Same distance. That's the edge."` },
    { icon:'📱', title:'Every Race = A Week of Content', sub:'The auto-generation pipeline',
      body: <>13 GPS metrics → 1 story card → 1 TikTok caption → 1 fantasy pick → 1 leaderboard. <span className="thi">Each of the {data.length} performances</span> auto-generates shareable content. Horse racing's Spotify Wrapped moment.</>,
      hook: `"This isn't analytics. This is content."` },
  ];
  return (
    <div>
      <div style={{ marginBottom: '20px' }}>
        <div style={{ fontSize: '10px', color: 'var(--muted2)', letterSpacing: '3px', textTransform: 'uppercase', marginBottom: '5px' }}>
          {data.length} performances · {new Set(data.map(h=>h.race_date+h.race_number)).size} races · All 13 GPS metrics
        </div>
        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: '22px', fontWeight: '700', color: 'var(--ink)' }}>GPS Insights That Would Go Viral</div>
      </div>
      <div className="tgrid">
        {trends.map(t => (
          <div key={t.title} className="tcard">
            <div className="thead2">
              <div className="ticon">{t.icon}</div>
              <div><div className="ttitle">{t.title}</div><div className="tsub">{t.sub}</div></div>
            </div>
            <div className="tbody">{t.body}</div>
            <div className="thook">{t.hook}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── APP ROOT ────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('cards');
  const [selRace, setSelRace] = useState('all');
  const [selKey, setSelKey] = useState(null);

  const races = useMemo(() => {
    const seen = new Set();
    return RACE_DATA.filter(h => {
      const k = h.race_date + '_' + h.race_number;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    }).map(h => ({ key: h.race_date + '_' + h.race_number, label: `${h.race_date} R${h.race_number}` }));
  }, []);

  const horses = useMemo(() => {
    if (selRace === 'all') return RACE_DATA;
    const [d, n] = selRace.split('_');
    return RACE_DATA.filter(h => h.race_date === d && h.race_number === parseInt(n));
  }, [selRace]);

  const active = useMemo(() =>
    selKey ? RACE_DATA.find(h => h.horse_name + h.race_date + h.race_number === selKey) : null
  , [selKey]);

  return (
    <div>
      <NewsTicker/>
      <div className="app">
        <UpcomingBoard/>

        <div className="header">
          <div className="logo">
            <div className="logo-mark">🏇</div>
            <div>
              <div className="logo-name">Race<span>IQ</span></div>
              <div className="logo-sub">GPS Story Cards · Turfway Park 2026</div>
            </div>
          </div>
          <div className="gps-badge">🛰 ALL 13 GPS METRICS</div>
        </div>

        <div className="tabs">
          {[['cards','🃏 Story Cards'],['leaderboard','🏆 Leaderboards'],['trends','📱 Viral Insights']].map(([id,lbl]) => (
            <button key={id} className={`tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{lbl}</button>
          ))}
        </div>

        {tab === 'cards' && <>
          <div className="race-row">
            <button className={`rpill ${selRace==='all'?'active':''}`} onClick={() => { setSelRace('all'); setSelKey(null); }}>All Races</button>
            {races.map(r => (
              <button key={r.key} className={`rpill ${selRace===r.key?'active':''}`}
                onClick={() => { setSelRace(r.key); setSelKey(null); }}>{r.label}</button>
            ))}
          </div>
          <div className="hgrid">
            {horses.map(h => {
              const ac = ARCH[h.archetype] || ARCH.Gambler;
              const k = h.horse_name + h.race_date + h.race_number;
              const pc = posColor(h.official_position);
              return (
                <button key={k} className={`hbtn ${selKey===k?'active':''}`} onClick={() => setSelKey(selKey===k?null:k)}>
                  <div className="arch-pip" style={{ background: ac.color }}/>
                  <div className="hbtn-name">{h.horse_name}</div>
                  <div className="hbtn-foot">
                    <span className="pos-dot" style={{ background: pc, color: h.official_position<=3?'#fff':'#7A7268' }}>{h.official_position}</span>
                    <span>{ac.emoji} {h.archetype}</span>
                  </div>
                </button>
              );
            })}
          </div>
          {active
            ? <StoryCard horse={active}/>
            : <div className="empty"><div className="big">🏇</div><p>Select a horse above to generate their GPS Story Card</p></div>}
        </>}

        {tab === 'leaderboard' && <Leaderboard data={RACE_DATA}/>}
        {tab === 'trends' && <Trends data={RACE_DATA}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
